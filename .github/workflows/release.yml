name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ''
            ldflags: '-s -w'
            cgo: 1
            apt_deps: 'libgl1-mesa-dev xorg-dev'
          - os: windows-latest
            goos: windows
            goarch: amd64
            ext: '.exe'
            ldflags: '-H windowsgui -s -w'
            cgo: 1

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_deps }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          
      - name: Get dependencies
        run: go mod download

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: go build -ldflags="${{ matrix.ldflags }}" -o CF-Scanner-GUI-${{ matrix.goos }}-amd64${{ matrix.ext }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CF-Scanner-GUI-${{ matrix.goos }}-amd64
          path: CF-Scanner-GUI-${{ matrix.goos }}-amd64${{ matrix.ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
